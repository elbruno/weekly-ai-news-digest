name: Auto-merge digest PRs

on:
  workflow_run:
    workflows: ["Weekly AI & Tech News Digest"]
    types: [completed]
  workflow_dispatch:

jobs:
  auto-merge:
    name: Merge open digest PRs
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge digest PRs (oldest first)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base main \
            --label digest \
            --json number \
            --jq 'sort_by(.number) | .[].number')"

          if [[ -z "${prs}" ]]; then
            echo "No open digest PRs found."
            exit 0
          fi

          for pr in ${prs}; do
            echo "Processing PR #${pr}"
            if gh pr merge "${pr}" --repo "$REPO" --squash --delete-branch; then
              echo "Merged PR #${pr}"
              continue
            fi

            echo "PR #${pr} did not merge cleanly. Rebasing its branch with main."
            gh pr checkout "${pr}" --repo "$REPO"
            git fetch origin main

            if ! git merge origin/main --no-ff --no-edit; then
              # Digest PRs only modify docs/index.html; keep PR content when resolving.
              git checkout --ours docs/index.html
              git add docs/index.html
              git commit -m "Resolve digest merge conflict before auto-merge"
            fi

            git push
            gh pr merge "${pr}" --repo "$REPO" --squash --delete-branch
          done
