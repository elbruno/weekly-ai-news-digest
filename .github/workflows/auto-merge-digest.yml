name: Auto-merge digest PRs

on:
  pull_request:
    types: [opened, labeled]
    branches: [main]

jobs:
  auto-merge:
    name: Squash-merge digest PR
    if: contains(github.event.pull_request.labels.*.name, 'digest')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge (squash)
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --auto \
            --delete-branch \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
